name: Scrape Articles

on:
  schedule:
    # Run every 30 minutes to stay within GitHub Actions free tier (2,000 min/month)
    # Free tier: 2,000 minutes/month
    # At 30 min intervals: ~1,440 runs/month × ~1.5 min/run = ~2,160 min/month (slightly over, but close)
    # At 30 min intervals: ~1,440 runs/month × ~1 min/run = ~1,440 min/month (within limit)
    # Note: GitHub Actions may delay scheduled workflows during high load
    # Workflows run on the default branch (main) only
    - cron: '*/30 * * * *'
  workflow_dispatch: # Allow manual triggering

# Ensure workflow runs even if previous runs failed
# This prevents GitHub from skipping scheduled runs due to failures
concurrency:
  group: scraper-cron
  cancel-in-progress: false

jobs:
  keepalive:
    if: github.event_name == 'schedule'
    runs-on: ubuntu-latest
    permissions:
      actions: write
    steps:
      - uses: liskin/gh-workflow-keepalive@v1

  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Check Schedule Status
        run: |
          echo "🕐 Current UTC time: $(date -u)"
          echo "📅 Scheduled to run every 30 minutes"
          echo "🔍 Workflow triggered by: ${{ github.event_name }}"
      
      - name: Trigger Scraper
        run: |
          # Construct URL - handle both with and without https://
          URL="${{ vars.SCRAPER_URL }}"
          
          # Debug: Check if variable exists
          echo "🔍 Checking for SCRAPER_URL variable..."
          
          # Debug: Show what we received (with quotes to see whitespace)
          echo "🔍 SCRAPER_URL variable (raw): '${URL}'"
          echo "🔍 SCRAPER_URL variable length: ${#URL} characters"
          
          if [[ -z "$URL" ]]; then
            echo "❌ ERROR: SCRAPER_URL variable is empty or not set!"
            echo "💡 Make sure you:"
            echo "   1. Go to Settings → Secrets and variables → Actions → Variables tab"
            echo "   2. Created a REPOSITORY variable (not environment variable) named SCRAPER_URL"
            echo "   3. Set the value to: www.vulnerabilityhub.com (use www to avoid redirects)"
            exit 1
          fi
          
          # Normalize URL: trim whitespace and remove trailing slashes
          URL=$(echo "$URL" | xargs | sed 's|/$||')
          
          # Extract domain and construct base URL
          if [[ "$URL" =~ ^https?:// ]]; then
            # URL already has protocol, extract domain
            DOMAIN=$(echo "$URL" | sed -E 's|^https?://||' | cut -d'/' -f1)
            # Get base URL (protocol + domain, no path)
            BASE_URL=$(echo "$URL" | sed -E 's|^(https?://[^/]+).*|\1|')
          else
            # URL doesn't have protocol, extract domain and add https://
            DOMAIN=$(echo "$URL" | cut -d'/' -f1)
            BASE_URL="https://${DOMAIN}"
          fi
          
          # Construct full endpoint URL
          FULL_URL="${BASE_URL}/api/cron/scraper"
          
          echo "✅ Extracted domain: ${DOMAIN}"
          echo "✅ Base URL: ${BASE_URL}"
          echo "✅ Full URL: ${FULL_URL}"
          
          # Test DNS resolution with multiple methods
          echo "🔍 Testing DNS resolution for: ${DOMAIN}"
          echo "--- Using 'host' command ---"
          host "${DOMAIN}" || echo "host command failed"
          echo "--- Using 'nslookup' command ---"
          nslookup "${DOMAIN}" || echo "nslookup command failed"
          echo "--- Using 'dig' command ---"
          dig "${DOMAIN}" +short || echo "dig command failed"
          
          # Try to resolve
          if ! getent hosts "${DOMAIN}" > /dev/null 2>&1; then
            echo "❌ DNS resolution failed for ${DOMAIN}"
            echo "💡 This usually means:"
            echo "   1. Domain is incorrect: '${DOMAIN}'"
            echo "   2. Network issue from GitHub Actions"
            echo ""
            echo "🔍 Attempting curl anyway to see detailed error..."
          else
            echo "✅ DNS resolution successful"
          fi
          
          # Make the request with error handling
          echo "📡 Making request to scraper endpoint..."
          echo "📡 URL: ${FULL_URL}"
          
          set +e  # Don't exit on error immediately
          # Use --location-trusted to forward Authorization header on redirects
          # (safe here since we control both domains)
          response=$(curl --location-trusted -X POST \
            -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}" \
            -H "Content-Type: application/json" \
            -w "\nHTTP_CODE:%{http_code}" \
            --connect-timeout 10 \
            --max-time 180 \
            -v \
            "${FULL_URL}" 2>&1)
          CURL_EXIT=$?
          set -e
          
          if [ $CURL_EXIT -ne 0 ]; then
            echo "❌ curl failed with exit code: $CURL_EXIT"
            echo "Full curl output:"
            echo "$response"
            
            # Check if it's a timeout error (exit code 28)
            if [ $CURL_EXIT -eq 28 ]; then
              echo ""
              echo "⚠️  Timeout error detected!"
              echo "💡 This might be due to:"
              echo "   1. Scraper taking longer than 3 minutes (180 seconds)"
              echo "   2. Vercel platform timeout limits (check your plan)"
              echo "   3. Network issues"
              echo ""
              echo "Check your Vercel logs to see if the scrape completed."
              exit 1
            fi
            
            exit 1
          fi
          
          # Extract HTTP code and body (curl verbose output is on stderr, response on stdout)
          http_code=$(echo "$response" | grep -o "HTTP_CODE:[0-9]*" | cut -d: -f2 || echo "000")
          body=$(echo "$response" | grep -v "^<" | grep -v "^>" | grep -v "HTTP_CODE:" | tail -n +1)
          
          echo ""
          echo "=== Response Summary ==="
          echo "HTTP Code: ${http_code}"
          echo "Response Body:"
          echo "$body"
          echo "========================"
          
          # Check if request was successful
          if [ "$http_code" -ge 200 ] && [ "$http_code" -lt 300 ]; then
            echo "✅ Scraper completed successfully (HTTP $http_code)"
            articles_added=$(echo "$body" | grep -o '"articlesAdded":[0-9]*' | head -1 | cut -d: -f2 || echo "")
            articles_processed=$(echo "$body" | grep -o '"articlesProcessed":[0-9]*' | head -1 | cut -d: -f2 || echo "")
            if [ -n "$articles_processed" ] && [ "$articles_processed" -gt 20 ] && [ "$articles_added" = "0" ]; then
              echo "::warning::Scraper processed $articles_processed items but added 0 articles. Feed may be stale or filters too aggressive."
            fi

            # Try to extract article counts from response if available
            if echo "$body" | grep -q "articlesAdded"; then
              processed=$(echo "$body" | grep -o '"articlesProcessed":[0-9]*' | cut -d: -f2 || echo "unknown")
              added=$(echo "$body" | grep -o '"articlesAdded":[0-9]*' | cut -d: -f2 || echo "unknown")
              skipped=$(echo "$body" | grep -o '"articlesSkipped":[0-9]*' | cut -d: -f2 || echo "unknown")
              echo "📰 Articles processed: $processed | Added: $added | Skipped: $skipped"
            fi
          else
            echo "❌ Scraper failed with HTTP $http_code"
            echo "Full response:"
            echo "$response"
            exit 1
          fi

